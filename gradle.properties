#---------------------------------------------
# Properties required for building Jipher
#---------------------------------------------

# Properties used for signing the JCE provider
propertyJceKsFile=
propertyJceKsAlias=
propertyJceKsStorePass=

#---------------------------------------------
# Path to the OpenSSL install base directory.
# The directory must contain the following files (if a `lib64` subdirectory exists then it will be used instead of `lib`):
# - Core library
#    `lib/libcrypto.3.dylib` or `lib/libcrypto.so.3` or `lib\libcrypto-3.dll`, as appropriate to the platform
# - FIPS module
#     `lib/ossl-modules/fips.dylib` or `lib/ossl-modules/fips.so` or `lib\ossl-modules\fips.dll`, as appropriate to the platform
# - FIPS module configuration
#     `ssl/fipsmodule.cnf` or `ssl/openssl.cnf`
# Note: This property can also be set as a system property
#jipher.openssl.dir=/usr/lib
#jipher.openssl.dir=C:/Program Files/OpenSSL/bin

#---------------------------------------------
# Use OpenSSL native library dependencies provided by the Operating System.
#jipher.openssl.useOsInstance=true
